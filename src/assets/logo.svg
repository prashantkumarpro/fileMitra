<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Left page fold: Blue to Purple -->
  <polygon points="20,35 50,15 50,85 20,65" fill="url(#brand-grad-1)" />
  <!-- Right page fold: Pink to Amber -->
  <polygon points="80,35 50,15 50,85 80,65" fill="url(#brand-grad-2)" />
  <!-- Top angle overlay -->
  <polygon points="50,15 80,35 50,55 20,35" fill="#ffffff" fill-opacity="0.15" />
  
  <defs>
    <linearGradient id="brand-grad-1" x1="20" y1="35" x2="50" y2="85" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0070f3" />
      <stop offset="100%" stop-color="#7928ca" />
    </linearGradient>
    <linearGradient id="brand-grad-2" x1="80" y1="35" x2="50" y2="85" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#ff0080" />
      <stop offset="100%" stop-color="#f9cb28" />
    </linearGradient>
  </defs>
</svg>
